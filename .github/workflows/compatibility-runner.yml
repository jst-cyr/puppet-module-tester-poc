name: Puppet Module Compatibility Runner

on:
  schedule:
    - cron: "0 2 * * *"  # Nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      profile:
        description: "Compatibility profile name"
        required: false
        default: "8-latest-maintained"
      metadata_mode:
        description: "Metadata handling mode (warn|fail)"
        required: false
        default: "warn"
      modules_json:
        description: "Optional JSON array override: [{\"repo\":\"...\",\"ref\":\"main\",\"os\":\"windows-latest\"}]"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      unit_matrix: ${{ steps.matrix.outputs.unit_matrix }}
      acceptance_matrix: ${{ steps.matrix.outputs.acceptance_matrix }}
      has_acceptance: ${{ steps.matrix.outputs.has_acceptance }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate modules config schema
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check jsonschema
          python scripts/validate_modules_config.py --config config/modules.json --schema config/modules.schema.json

      - name: Build module matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          ruby -rjson <<'RUBY' > .tmp-matrix.json
          raw = '${{ github.event.inputs.modules_json }}'.strip
          modules = raw.empty? ? JSON.parse(File.read('config/modules.json')).fetch('modules', []) : JSON.parse(raw)

          unit = []
          acceptance = []

          modules.each do |m|
            repo = m.fetch('repo')
            ref = m.fetch('ref', 'main')
            id = m['id'] || repo.sub(%r{/$}, '').split('/').last.sub(/\.git$/, '').gsub(/[^a-zA-Z0-9_.-]+/, '-')
            os = m.fetch('os', 'ubuntu-latest')
            prereqs = m.fetch('prereqs', {})

            unit << {
              'repo' => repo,
              'ref' => ref,
              'id' => id,
              'os' => os,
              'prereqs' => prereqs,
              'lane' => 'unit',
              'target' => 'unit'
            }

            acceptance_cfg = m['acceptance']
            next unless acceptance_cfg.is_a?(Hash) && acceptance_cfg['enabled']

            targets = acceptance_cfg['targets']
            next unless targets.is_a?(Array)

            targets.each do |target|
              next unless target.is_a?(Hash)

              target_name = target.fetch('name')
              target_id = target_name.gsub(/[^a-zA-Z0-9_.-]+/, '-')
              acceptance << {
                'repo' => repo,
                'ref' => ref,
                'id' => id,
                'os' => target.fetch('runs_on', 'ubuntu-latest'),
                'prereqs' => prereqs,
                'lane' => 'acceptance',
                'target' => target_name,
                'target_id' => target_id
              }
            end
          end

          puts JSON.generate({
            'unit_matrix' => unit,
            'acceptance_matrix' => acceptance,
            'has_acceptance' => (!acceptance.empty?).to_s
          })
          RUBY

          UNIT_MATRIX=$(python -c "import json; print(json.dumps(json.load(open('.tmp-matrix.json', encoding='utf-8'))['unit_matrix']))")
          ACCEPTANCE_MATRIX=$(python -c "import json; print(json.dumps(json.load(open('.tmp-matrix.json', encoding='utf-8'))['acceptance_matrix']))")
          HAS_ACCEPTANCE=$(python -c "import json; print(json.load(open('.tmp-matrix.json', encoding='utf-8'))['has_acceptance'])")
          echo "unit_matrix=$UNIT_MATRIX" >> "$GITHUB_OUTPUT"
          echo "acceptance_matrix=$ACCEPTANCE_MATRIX" >> "$GITHUB_OUTPUT"
          echo "has_acceptance=$HAS_ACCEPTANCE" >> "$GITHUB_OUTPUT"

  test_unit:
    name: test / ${{ matrix.module.id }} / unit
    runs-on: ${{ matrix.module.os }}
    timeout-minutes: ${{ fromJSON(vars.PUPPET_JOB_TIMEOUT_MINUTES || '360') }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare.outputs.unit_matrix) }}

    env:
      PUPPET_CORE_API_KEY: ${{ secrets.PUPPET_CORE_API_KEY }}
      PUPPET_CORE_SOURCE_URL: https://rubygems-puppetcore.puppet.com
      PUPPET_COMPAT_METADATA_MODE: ${{ github.event.inputs.metadata_mode || 'warn' }}
      PUPPET_COMPAT_BUNDLE_PATH: .b
      PUPPET_ENFORCE_PRIVATE_SOURCE: "true"
      PUPPET_ENFORCE_NO_OPENVOX: "false"
      PUPPET_ENFORCE_EXACT_PUPPET_VERSION: "true"
      PUPPET_SPLIT_SOURCES: "true"
      PUPPET_STAGE_TIMEOUT_SECONDS: ${{ vars.PUPPET_STAGE_TIMEOUT_SECONDS || '1800' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Git long paths on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          git config --global --get core.longpaths

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install module prerequisites on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          apt_pkgs=$(echo '${{ toJson(matrix.module.prereqs) }}' | python -c "import json,sys; d=json.load(sys.stdin); pkgs=d.get('apt',[]); print(' '.join(pkgs)) if pkgs else None")
          if [ -n "$apt_pkgs" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y $apt_pkgs
          fi

      - name: Install module prerequisites on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prereqs = '${{ toJson(matrix.module.prereqs) }}' | ConvertFrom-Json
          if ($null -ne $prereqs -and $null -ne $prereqs.choco -and $prereqs.choco.Count -gt 0) {
            choco install -y @($prereqs.choco)
          }

      - name: Install module prerequisites on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew_pkgs=$(echo '${{ toJson(matrix.module.prereqs) }}' | python -c "import json,sys; d=json.load(sys.stdin); pkgs=d.get('brew',[]); print(' '.join(pkgs)) if pkgs else None")
          if [ -n "$brew_pkgs" ]; then
            brew update
            brew install $brew_pkgs
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install runner
        run: |
          bundle install

      - name: Build single-module config
        shell: bash
        run: |
          mkdir -p .tmp
          ruby -rjson -e "mod=JSON.parse(ENV.fetch('MODULE_JSON')); File.write('.tmp/single-module.json', JSON.pretty_generate({'modules'=>[{'repo'=>mod.fetch('repo'),'ref'=>mod.fetch('ref','main')}] }))"
        env:
          MODULE_JSON: ${{ toJson(matrix.module) }}

      - name: Run compatibility runner
        id: run_runner
        continue-on-error: true
        shell: bash
        run: |
          ruby bin/puppet-module-tester \
            --modules-file .tmp/single-module.json \
            --profiles-file profiles/puppet_profiles.json \
            --profile "${{ github.event.inputs.profile || '8-latest-maintained' }}" \
            --test-mode unit \
            --workspace-dir w \
            --output-dir "o/${{ matrix.module.id }}"

      - name: Record module status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "o/${{ matrix.module.id }}"
          python scripts/classify_module_result.py
        env:
          REPORT: o/${{ matrix.module.id }}/compatibility-report.json
          STATUS_FILE: o/${{ matrix.module.id }}/module-status.json
          MODULE_ID: ${{ matrix.module.id }}
          TEST_LANE: unit
          ACCEPTANCE_TARGET: unit

      - name: Write module summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python scripts/render_module_job_summary.py
        env:
          STATUS_FILE: o/${{ matrix.module.id }}/module-status.json
          MODULE_ID: ${{ matrix.module.id }}

      - name: Upload module artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-${{ matrix.module.id }}-unit
          path: o/${{ matrix.module.id }}
          if-no-files-found: warn

      - name: Show failure diagnostics
        if: steps.run_runner.outcome == 'failure'
        shell: bash
        run: |
          echo "Runner failed for module: ${{ matrix.module.id }}"
          echo "---- module-status.json ----"
          if [ -f "o/${{ matrix.module.id }}/module-status.json" ]; then
            cat "o/${{ matrix.module.id }}/module-status.json"
          else
            echo "module-status file not found"
          fi
          echo "---- compatibility-summary.md ----"
          if [ -f "o/${{ matrix.module.id }}/compatibility-summary.md" ]; then
            cat "o/${{ matrix.module.id }}/compatibility-summary.md"
          else
            echo "summary file not found"
          fi
          echo "---- compatibility-report.json (first 200 lines) ----"
          if [ -f "o/${{ matrix.module.id }}/compatibility-report.json" ]; then
            sed -n '1,200p' "o/${{ matrix.module.id }}/compatibility-report.json"
          else
            echo "report file not found"
          fi
          exit 1

  test_acceptance:
    name: test / ${{ matrix.module.id }} / acceptance / ${{ matrix.module.target_id }}
    runs-on: ${{ matrix.module.os }}
    timeout-minutes: ${{ fromJSON(vars.PUPPET_JOB_TIMEOUT_MINUTES || '360') }}
    needs: prepare
    if: needs.prepare.outputs.has_acceptance == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare.outputs.acceptance_matrix) }}

    env:
      PUPPET_CORE_API_KEY: ${{ secrets.PUPPET_CORE_API_KEY }}
      PUPPET_CORE_SOURCE_URL: https://rubygems-puppetcore.puppet.com
      PUPPET_COMPAT_METADATA_MODE: ${{ github.event.inputs.metadata_mode || 'warn' }}
      PUPPET_COMPAT_BUNDLE_PATH: .b
      PUPPET_ENFORCE_PRIVATE_SOURCE: "true"
      PUPPET_ENFORCE_NO_OPENVOX: "false"
      PUPPET_ENFORCE_EXACT_PUPPET_VERSION: "true"
      PUPPET_SPLIT_SOURCES: "true"
      PUPPET_STAGE_TIMEOUT_SECONDS: ${{ vars.PUPPET_STAGE_TIMEOUT_SECONDS || '1800' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Git long paths on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          git config --global --get core.longpaths

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install module prerequisites on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          apt_pkgs=$(echo '${{ toJson(matrix.module.prereqs) }}' | python -c "import json,sys; d=json.load(sys.stdin); pkgs=d.get('apt',[]); print(' '.join(pkgs)) if pkgs else None")
          if [ -n "$apt_pkgs" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y $apt_pkgs
          fi

      - name: Install module prerequisites on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $prereqs = '${{ toJson(matrix.module.prereqs) }}' | ConvertFrom-Json
          if ($null -ne $prereqs -and $null -ne $prereqs.choco -and $prereqs.choco.Count -gt 0) {
            choco install -y @($prereqs.choco)
          }

      - name: Install module prerequisites on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew_pkgs=$(echo '${{ toJson(matrix.module.prereqs) }}' | python -c "import json,sys; d=json.load(sys.stdin); pkgs=d.get('brew',[]); print(' '.join(pkgs)) if pkgs else None")
          if [ -n "$brew_pkgs" ]; then
            brew update
            brew install $brew_pkgs
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install runner
        run: |
          bundle install

      - name: Build single-module config
        shell: bash
        run: |
          mkdir -p .tmp
          ruby -rjson -e "mod=JSON.parse(ENV.fetch('MODULE_JSON')); File.write('.tmp/single-module.json', JSON.pretty_generate({'modules'=>[{'repo'=>mod.fetch('repo'),'ref'=>mod.fetch('ref','main')}] }))"
        env:
          MODULE_JSON: ${{ toJson(matrix.module) }}

      - name: Run compatibility runner (acceptance lane)
        id: run_runner
        continue-on-error: true
        shell: bash
        run: |
          ruby bin/puppet-module-tester \
            --modules-file .tmp/single-module.json \
            --profiles-file profiles/puppet_profiles.json \
            --profile "${{ github.event.inputs.profile || '8-latest-maintained' }}" \
            --allow-acceptance \
            --test-mode acceptance \
            --workspace-dir w \
            --output-dir "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}"

      - name: Record module status
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}"
          python scripts/classify_module_result.py
        env:
          REPORT: o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/compatibility-report.json
          STATUS_FILE: o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/module-status.json
          MODULE_ID: ${{ matrix.module.id }}
          TEST_LANE: acceptance
          ACCEPTANCE_TARGET: ${{ matrix.module.target }}

      - name: Write module summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python scripts/render_module_job_summary.py
        env:
          STATUS_FILE: o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/module-status.json
          MODULE_ID: ${{ matrix.module.id }}

      - name: Upload module artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-${{ matrix.module.id }}-acceptance-${{ matrix.module.target_id }}
          path: o/${{ matrix.module.id }}-${{ matrix.module.target_id }}
          if-no-files-found: warn

      - name: Show acceptance diagnostics
        if: steps.run_runner.outcome == 'failure'
        shell: bash
        run: |
          echo "Acceptance runner failed for module: ${{ matrix.module.id }} (target: ${{ matrix.module.target }})"
          echo "---- module-status.json ----"
          if [ -f "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/module-status.json" ]; then
            cat "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/module-status.json"
          else
            echo "module-status file not found"
          fi
          echo "---- compatibility-summary.md ----"
          if [ -f "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/compatibility-summary.md" ]; then
            cat "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/compatibility-summary.md"
          else
            echo "summary file not found"
          fi
          echo "---- compatibility-report.json (first 200 lines) ----"
          if [ -f "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/compatibility-report.json" ]; then
            sed -n '1,200p' "o/${{ matrix.module.id }}-${{ matrix.module.target_id }}/compatibility-report.json"
          else
            echo "report file not found"
          fi

  summarize:
    runs-on: ubuntu-latest
    needs:
      - test_unit
      - test_acceptance
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download module artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: compatibility-*
          merge-multiple: false

      - name: Summarize results
        shell: bash
        run: |
          set -euo pipefail
          python scripts/summarize_module_statuses.py
        env:
          STATUS_ROOT: all-artifacts
